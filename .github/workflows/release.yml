# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go Build and Release

on:
  push:
    tags:
      - v*

env:
  APP_NAME: rrcmd
  BUILD_DIR: build
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: [1.23.4]
        os: [linux]
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Golang
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o ${{ env.BUILD_DIR }}/${{ env.APP_NAME }}_${{ matrix.os }}_${{ matrix.arch }} -v ./...

      - name: Check
        run: |
          if [ ! -f ${{ env.BUILD_DIR }}/${{ env.APP_NAME }}_${{ matrix.os }}_${{ matrix.arch }} ]; then
            echo "Build failed or output file not found!"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          name: ${{ env.RELEASE_TAG }}
          # tag_name: ${{ env.RELEASE_TAG }}
          body: "远程执行命令, 多主机并发"
          token: ${{ secrets.MY_TOKEN }}
          files: ${{ env.BUILD_DIR }}/${{ env.APP_NAME }}_${{ matrix.os }}_${{ matrix.arch }}

  clean:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Delete workflow
        uses: Mattraks/delete-workflow-runs@v2.1.0
        with:
          token: ${{ secrets.MY_TOKEN }}
          retain_days: 1
          keep_minimum_runs: 3

      - name: Delete older releases
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}
        shell: bash
        run: |
          echo "--- 正在清理旧的 Release 和 Tag ---"
          # 获取列表并存入变量
          gh release list --limit 100
          RELEASES=$(gh release list --limit 100 | grep -v "latest" | tail -n +2 | awk '{print $1}')
          
          if [ -n "$RELEASES" ]; then
            # -r: 为空不执行 | -I %: 定义占位符 | -n 1: 每次处理一个
            echo "$RELEASES" | xargs -r -I % -n 1 gh release delete % --yes --cleanup-tag
          else
            echo "没有需要删除的 Release"
          fi

          echo "--- 正在清理旧的 Workflow 运行记录 ---"
          gh run list --limit 100 --status completed
          RUN_IDS=$(gh run list --limit 100 --status completed | tail -n +2 | awk '{print $7}')
          
          if [ -n "$RUN_IDS" ]; then
            echo "$RUN_IDS" | xargs -r -I % -n 1 gh run delete %
          else
            echo "没有需要删除的运行记录"
          fi