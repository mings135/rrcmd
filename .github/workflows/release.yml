# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go Build and Release

on:
  push:
    tags:
      - v*

env:
  APP_NAME: rrcmd
  BUILD_DIR: build
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: [1.23.4]
        os: [linux]
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Golang
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o ${{ env.BUILD_DIR }}/${{ env.APP_NAME }}_${{ matrix.os }}_${{ matrix.arch }} -v ./...

      - name: Check
        run: |
          if [ ! -f ${{ env.BUILD_DIR }}/${{ env.APP_NAME }}_${{ matrix.os }}_${{ matrix.arch }} ]; then
            echo "Build failed or output file not found!"
            exit 1
          fi

      # - name: Create Release
      #   uses: softprops/action-gh-release@v2.6.1
      #   with:
      #     name: ${{ env.RELEASE_TAG }}
      #     # tag_name: ${{ env.RELEASE_TAG }}
      #     body: "远程执行命令, 多主机并发"
      #     token: ${{ secrets.MY_TOKEN }}
      #     files: ${{ env.BUILD_DIR }}/${{ env.APP_NAME }}_${{ matrix.os }}_${{ matrix.arch }}

      - name: Create or Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_FILE: ${{ env.BUILD_DIR }}/${{ env.APP_NAME }}_${{ matrix.os }}_${{ matrix.arch }}
        run: |
          echo "--- 正在处理 Release $RELEASE_TAG ---"
          
          # 检查 Release 是否已经存在
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release 已存在，正在上传新文件..."
            gh release upload "$RELEASE_TAG" "$RELEASE_FILE" --clobber
          else
            echo "创建新 Release 并上传文件..."
            gh release create "$RELEASE_TAG" "$RELEASE_FILE" \
              --title "$RELEASE_TAG" \
              --notes "远程执行命令, 多主机并发"
          fi

  clean:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clean releases and workflows
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}
        shell: bash
        run: |
          echo "--- 正在清理旧的 Release 和 Tag ---"
          # 使用 --json 确保 Tag 100% 准确，保留最新的几个(排除 latest)
          RELEASES=$(gh release list --limit 100 --json tagName,isLatest \
            | jq -r '.[] | select(.isLatest == false) | .tagName' \
            | tail -n +3) 
          
          if [ -n "$RELEASES" ]; then
            echo "发现待删除 Release: $RELEASES"
            echo "$RELEASES" | xargs -r -I % -n 1 gh release delete % --yes --cleanup-tag
          else
            echo "✅ 没有需要删除的 Release"
          fi

          echo "--- 正在清理旧的 Workflow 运行记录 ---"
          # 使用 --json 提取 run ID
          RUN_IDS=$(gh run list --limit 100 --status completed --json databaseId \
            | jq -r '.[].databaseId' \
            | tail -n +6)
          
          if [ -n "$RUN_IDS" ]; then
            echo "发现待删除运行记录 ID: $RUN_IDS"
            echo "$RUN_IDS" | xargs -r -I % -n 1 gh run delete %
          else
            echo "✅ 没有需要删除的运行记录"
          fi